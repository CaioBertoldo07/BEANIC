name: Sync to isaacanijar/beanic

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mirror to isaacanijar/beanic
        run: |
          git remote add target https://x-access-token:${{ secrets.SYNC_TARGET_TOKEN }}@github.com/isaacanijar/beanic.git
          git push target main:main --force
