  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

--text-dim:#9aa9bc;\n    --text-mute:#6c7c91;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}\n  body{overflow-x:hidden}\n  a{color:inherit;text-decoration:none}\n  button{font-family:inherit;cursor:pointer;border:0;background:transparent;color:inherit}\n  h1,h2,h3,h4{font-family:'Sora',sans-serif;font-weight:600;letter-spacing:-0.02em;margin:0;text-wrap:balance}\n  p{margin:0;color:var(--text-dim);line-height:1.6}\n  .container{max-width:1280px;margin:0 auto;padding:0 40px}\n  .mono{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--cyan)}\n\n  /* Background grid + glow */\n  .bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;\n    background-image:\n      linear-gradient(rgba(150,180,210,0.04) 1px, transparent 1px),\n      linear-gradient(90deg, rgba(150,180,210,0.04) 1px, transparent 1px);\n    background-size:80px 80px;\n    mask-image:radial-gradient(ellipse at 50% 0%, #000 30%, transparent 75%);\n  }\n  .bg-glow{position:fixed;top:-200px;right:-200px;width:800px;height:800px;border-radius:50%;\n    background:radial-gradient(circle, rgba(43,180,229,0.10), transparent 60%);\n    pointer-events:none;z-index:0;filter:blur(20px);\n  }\n\n  /* Header */\n  header{position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);background:rgba(5,13,24,0.72);border-bottom:1px solid var(--line)}\n  .nav{display:flex;align-items:center;justify-content:space-between;height:72px}\n  .brand{display:flex;align-items:center;gap:12px}\n  .brand img{height:34px;width:auto;display:block}\n  .brand-tag{display:flex;flex-direction:column;line-height:1}\n  .brand-name{font-family:'Sora',sans-serif;font-weight:600;font-size:18px;letter-spacing:0.08em}\n  .brand-sub{font-size:10px;color:var(--text-mute);letter-spacing:0.16em;text-transform:uppercase;margin-top:4px}\n  nav.main{display:flex;gap:36px}\n  nav.main a{font-size:14px;color:var(--text-dim);transition:color .2s;position:relative}\n  nav.main a:hover{color:var(--text)}\n  nav.main a.active{color:var(--text)}\n  nav.main a.active::after{content:\"\";position:absolute;left:0;right:0;bottom:-24px;height:2px;background:var(--cyan)}\n  .nav-cta{display:flex;align-items:center;gap:12px}\n\n  /* Buttons */\n  .btn{display:inline-flex;align-items:center;gap:10px;padding:13px 22px;border-radius:8px;font-size:14px;font-weight:500;transition:all .2s;border:1px solid transparent}\n  .btn-primary{background:var(--cyan);color:#04121d}\n  .btn-primary:hover{background:var(--cyan-2);transform:translateY(-1px);box-shadow:0 10px 30px -10px rgba(43,180,229,0.5)}\n  .btn-ghost{border-color:var(--line-strong);color:var(--text)}\n  .btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}\n  .btn-arrow{width:18px;height:18px;display:inline-block;background:currentColor;-webkit-mask:url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2'><path d='M5 12h14M13 6l6 6-6 6'/><\u002Fsvg>\") center/contain no-repeat;mask:url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2'><path d='M5 12h14M13 6l6 6-6 6'/><\u002Fsvg>\") center/contain no-repeat}\n\n  /* Section frame */\n  section{position:relative;z-index:1}\n  .section{padding:120px 0;position:relative}\n  .section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:60px;margin-bottom:64px}\n  .section-head h2{font-size:48px;line-height:1.05;max-width:640px}\n  .section-head .lead{max-width:420px;color:var(--text-dim);font-size:15px}\n  .eyebrow{display:inline-flex;align-items:center;gap:10px;margin-bottom:18px}\n  .eyebrow .dot{width:6px;height:6px;background:var(--cyan);border-radius:50%;box-shadow:0 0 12px var(--cyan)}\n\n  /* HERO */\n  .hero{padding:96px 0 120px;position:relative}\n  .hero-grid{display:grid;grid-template-columns:1.05fr 1fr;gap:80px;align-items:center}\n  .hero h1{font-size:68px;line-height:1.02;font-weight:600;letter-spacing:-0.03em}\n  .hero h1 .accent{color:var(--cyan);position:relative}\n  .hero h1 .accent::after{content:\"\";position:absolute;left:0;right:0;bottom:6px;height:8px;background:var(--cyan-soft);z-index:-1}\n  .hero p.sub{margin-top:28px;font-size:18px;color:var(--text-dim);max-width:540px;line-height:1.55}\n  .hero-actions{margin-top:40px;display:flex;gap:14px;flex-wrap:wrap}\n  .hero-stats{margin-top:56px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border-top:1px solid var(--line);padding-top:32px;max-width:560px}\n  .hero-stat .n{font-family:'Sora',sans-serif;font-size:32px;font-weight:600;color:var(--text);letter-spacing:-0.02em}\n  .hero-stat .n .unit{color:var(--cyan);font-size:22px;margin-left:2px}\n  .hero-stat .l{font-size:12px;color:var(--text-mute);margin-top:6px;letter-spacing:0.04em}\n\n  /* Hero composition (dashboard mock) */\n  .hero-comp{position:relative;height:600px}\n  .panel{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:14px;box-shadow:0 30px 60px -30px rgba(0,0,0,0.6)}\n  .dash{position:absolute;top:0;left:0;width:100%;padding:18px;animation:float 8s ease-in-out infinite}\n  .dash-head{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;border-bottom:1px solid var(--line)}\n  .dash-dots{display:flex;gap:6px}\n  .dash-dots i{width:8px;height:8px;border-radius:50%;background:var(--line-strong);display:block}\n  .dash-dots i:first-child{background:var(--cyan)}\n  .dash-path{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-mute)}\n  .dash-grid{padding:18px 0 4px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}\n  .kpi{background:rgba(255,255,255,0.02);border:1px solid var(--line);border-radius:10px;padding:14px}\n  .kpi .k{font-size:10px;color:var(--text-mute);letter-sp nt]');\n  const animate = (el) => {\n    const target = parseFloat(el.getAttribute('data-count'));\n    const numEl = el.querySelector('span:first-child');\n    const dur = 1400;\n    const t0 = performance.now();\n    const tick = (t) => {\n      const p = Math.min(1, (t - t0) / dur);\n      const e = 1 - Math.pow(1 - p, 3);\n      numEl.textContent = Math.round(target * e);\n      if (p < 1) requestAnimationFrame(tick);\n    };\n    requestAnimationFrame(tick);\n  };\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(en => {\n      if (en.isIntersecting) { animate(en.target); io.unobserve(en.target); }\n    });\n  }, {threshold: 0.4});\n  counters.forEach(c => io.observe(c));\n\n  // Process track lit\n  const ptrack = document.getElementById('ptrack');\n  const io2 = new IntersectionObserver(e => {\n    e.forEach(en => { if (en.isIntersecting) ptrack.classList.add('lit'); });\n  }, {threshold: 0.3});\n  if (ptrack) io2.observe(ptrack);\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
